version: '3.9'

# ─── Shared defaults ──────────────────────────────────────────────────────────
x-postgres: &postgres-defaults
  image: postgres:16-alpine
  restart: unless-stopped
  environment:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres

x-app-build: &app-build
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  depends_on:
    kafka:
      condition: service_healthy

# ─────────────────────────────────────────────────────────────────────────────
services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          'CMD',
          'kafka-broker-api-versions',
          '--bootstrap-server',
          'localhost:29092',
        ]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  postgres-auth:
    <<: *postgres-defaults
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d auth_db']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-product:
    <<: *postgres-defaults
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: product_db
    volumes:
      - postgres-product-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d product_db']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-order:
    <<: *postgres-defaults
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_db
    volumes:
      - postgres-order-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d order_db']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-payment:
    <<: *postgres-defaults
    ports:
      - '5435:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment_db
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d payment_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Applications ─────────────────────────────────────────────────────────────

  api-gateway:
    <<: *app-build
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN_SECONDS: 3600
      DB_HOST: postgres-auth
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: auth_db
      KAFKA_BROKER: kafka:29092
    depends_on:
      postgres-auth:
        condition: service_healthy
      kafka:
        condition: service_healthy

  product-service:
    <<: *app-build
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: product-service
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_HOST: postgres-product
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: product_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKER: kafka:29092
    depends_on:
      postgres-product:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  order-service:
    <<: *app-build
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: order-service
    ports:
      - '3002:3002'
    environment:
      PORT: 3002
      NODE_ENV: production
      DB_HOST: postgres-order
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: order_db
      KAFKA_BROKER: kafka:29092
    depends_on:
      postgres-order:
        condition: service_healthy
      kafka:
        condition: service_healthy

  payment-service:
    <<: *app-build
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: payment-service
    ports:
      - '3003:3003'
    environment:
      PORT: 3003
      NODE_ENV: production
      DB_HOST: postgres-payment
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: payment_db
      KAFKA_BROKER: kafka:29092
    depends_on:
      postgres-payment:
        condition: service_healthy
      kafka:
        condition: service_healthy

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  redis-data:
  postgres-auth-data:
  postgres-product-data:
  postgres-order-data:
  postgres-payment-data:
