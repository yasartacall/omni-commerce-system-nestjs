apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: omni-commerce/order-service:latest
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: order-service-config
            - secretRef:
                name: order-service-secret
          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '512Mi'
              cpu: '500m'
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  type: ClusterIP
  ports:
    - port: 3002
      targetPort: 3002
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
data:
  PORT: '3002'
  NODE_ENV: production
  DB_HOST: postgres-order
  DB_PORT: '5432'
  DB_USER: postgres
  DB_NAME: order_db
  KAFKA_BROKER: kafka:29092
---
apiVersion: v1
kind: Secret
metadata:
  name: order-service-secret
type: Opaque
stringData:
  DB_PASSWORD: postgres
